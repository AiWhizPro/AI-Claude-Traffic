{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Claude Traffic - Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'blog/memphis/styles.css' %}">
</head>
<body>
    {% if messages %}
        <div class="container mb-20" style="padding-bottom: 0;">
            {% for message in messages %}
            <div class="card card-accent" style="padding: 15px; margin-bottom: 10px;">
                <p style="margin: 0; font-weight: 600;">{{ message }}</p>
            </div>
            {% endfor %}
        </div>
    {% endif %}

    <main>
        {% block content %}
        {% endblock content %}
    </main>

    <footer style="text-align: center; padding: 40px; margin-top: 40px; border-top: 3px dashed var(--memphis-black);">
        <p style="font-weight: 600;">&copy; {% now "Y" %} AI Claude Traffic. All rights reserved.</p>
    </footer>
</body>
</html>
