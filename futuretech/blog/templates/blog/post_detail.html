<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }} - AI Claude Traffic</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f9fafb;
            color: #333;
        }
        .navbar {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1em;
        }
        .navbar a:hover {
            color: #764ba2;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .post-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 40px;
        }
        .post-header h1 {
            font-size: 2.5em;
            margin-bottom: 15px;
        }
        .post-keyword {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.95em;
            margin-right: 15px;
        }
        .post-meta {
            font-size: 0.95em;
            opacity: 0.9;
            margin-top: 15px;
        }
        .post-content {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            line-height: 1.8;
        }
        .post-content h2 {
            margin-top: 30px;
            margin-bottom: 15px;
            color: #667eea;
        }
        .post-content h3 {
            margin-top: 20px;
            margin-bottom: 10px;
            color: #555;
        }
        .post-content p {
            margin-bottom: 15px;
        }
        .post-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        .post-content th,
        .post-content td {
            border: 1px solid #e5e7eb;
            padding: 12px;
            text-align: left;
        }
        .post-content th {
            background: #f3f4f6;
            font-weight: 600;
        }
        .post-content .reddit-quote {
            background: #eef3ff;
            border-left: 4px solid #667eea;
            padding: 18px;
            margin: 20px 0;
            border-radius: 4px;
            font-style: italic;
        }
        .post-content .thread-info {
            color: #666;
            font-size: 0.9em;
            margin-top: 8px;
        }
        .post-content .callout {
            background: #eaf9f0;
            border: 1px solid #c7ead7;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .card {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
        }
        .card.featured {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .footer {
            text-align: center;
            color: #666;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="{% url 'blog:home' %}">← Back to all posts</a>
    </div>

    <div class="container">
        <div class="post-header">
            <h1>{{ post.title }}</h1>
            <span class="post-keyword">{{ post.comparison_keyword }}</span>
            <div class="post-meta">
                Published: {{ post.created_at|date:"F d, Y" }} | Last updated: {{ post.updated_at|date:"F d, Y" }}
            </div>
        </div>

        <div class="post-content">
            {{ post.content|safe }}
        </div>

        <div class="footer">
            <p>AI Claude Traffic © 2026</p>
        </div>
    </div>
</body>
</html>
